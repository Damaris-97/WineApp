<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novedades</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Últimas Novedades de la Industria Vitivinícola</h1>
        <ul>
            {% for noticia in noticias %}
                <li>
                    <h2>{{ noticia.titulo }}</h2>
                    <p>{{ noticia.contenido }}</p>
                    <small>{{ noticia.fecha.strftime('%d-%m-%Y') }}</small>
                </li>
            {% else %}
                <li>No hay novedades disponibles.</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
