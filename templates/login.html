<body>
    <div class="image-container">
        <img src="https://scontent.faep24-1.fna.fbcdn.net/v/t39.30808-6/299782454_5279866558728836_5850372064104796112_n.jpg?stp=dst-jpg_s640x640&_nc_cat=102&ccb=1-7&_nc_sid=127cfc&_nc_ohc=upp8mQQWrwoQ7kNvgETunCb&_nc_zt=23&_nc_ht=scontent.faep24-1.fna&_nc_gid=A0AcONYa4sfSPw9FuURiXk9&oh=00_AYDuoHCtFsFc6oAynlejanE3RsCpz2HoXiJsfs4fR5brzQ&oe=66DEC907" alt="Imagen 1" class="side-image">
        <div class="overlay-text">
            <h1>Bienvenido al mundo de el Vino</h1>
            <h2>Descubre las últimas noticias y aprende mas sobre este asombroso mundo.</h2>
            <a href="#login-form" class="my-button" id="explore-button">Explorar</a>
        </div>
    </div>

    <!-- Contenedor de formularios -->
    <div class="form-container">
        <!-- Formulario de Iniciar Sesión -->
        <div class="form-box" id="login-form">
            <h2>Iniciar Sesión</h2>
            <form action="{{ url_for('login') }}" method="POST">
                <label for="username">Correo:</label>
                <input type="text" id="username" name="username" required>
                
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
                
                <button type="submit">Iniciar Sesión</button>            
            </form>
        </div>

        <!-- Formulario de Registro -->
        <div class="form-box" id="registration-form">
            <h2>Registrarse</h2>
            <form action="{{ url_for('login') }}" method="POST">
                <label for="email">Correo:</label>
                <input type="email" id="correo" name="email" required>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
                
                <button type="submit">Registrarse</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('explore-button').addEventListener('click', function(event) {
            event.preventDefault(); // Evita el comportamiento por defecto del enlace
            const targetId = this.getAttribute('href').substring(1); // Obtiene el ID de destino
            const targetElement = document.getElementById(targetId); // Encuentra el elemento destino
            window.scrollTo({
                top: targetElement.offsetTop,
                behavior: 'smooth' // Desplazamiento suave
            });
        });
    </script>
</body>
</html>
