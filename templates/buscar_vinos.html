{% extends 'base.html' %}

{% block content %}
<h1>Buscar Vino</h1><link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='turismo.css') }}">

<form method="POST">
    <input type="text" name="query" placeholder="Buscar por nombre...">
    <button type="submit">Buscar</button>
</form>

{% if vinos %}
    <h2>Resultados de búsqueda</h2>
    <ul>
    {% for vino in vinos %}
        <li>{{ vino.nombre }} - {{ vino.tipo }}</li>
    {% endfor %}
    </ul>
{% else %}
    <p>No se encontraron resultados.</p>
{% endif %}
{% endblock %}
