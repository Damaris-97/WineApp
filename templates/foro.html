<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foro de Opiniones</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='turismo.css') }}">
</head>
<body>
    <div class="container">
        <h1>Foro de Opiniones</h1>
        <form id="opinionForm">
            <input type="text" id="usuario" placeholder="Tu nombre" required>
            <textarea id="comentario" placeholder="Tu opinión" required></textarea>
            <button type="submit">Enviar Opinión</button>
        </form>
        <h2>Opiniones</h2>
        <ul id="opinionesList"></ul>
    </div>
    <script src="foro.js"></script>
</body>
</html>
