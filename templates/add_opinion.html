{% extends 'base.html' %}

{% block content %}
<h1>Agregar Opinión</h1>
<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='turismo.css') }}">
<form method="POST">
    <input type="text" name="username" placeholder="Tu nombre" required>
    <textarea name="comment" placeholder="Tu opinión" required></textarea>
    <input type="number" name="rating" min="1" max="5" placeholder="Calificación (1-5)" required>
    <button type="submit">Enviar Opinión</button>
</form>
{% endblock %}
