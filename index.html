<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/static/index.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .header {
            background-color: #2c3e50;
            color: #fff;
            padding: 20px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header .logo h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        .nav {
            margin-top: 10px;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            padding: 10px 15px;
            margin: 0 5px;
            background-color: #e74c3c;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .nav a:hover {
            background-color: #c0392b;
        }

        .news-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .news-container a {
            position: relative;
            flex: 1 1 calc(33.333% - 40px); /* Tres imágenes por fila */
            max-width: calc(33.333% - 40px);
            text-decoration: none;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex; /* Añadido para asegurar que el contenedor a tenga altura adecuada */
            align-items: center; /* Centra el contenido verticalmente */
            justify-content: center; /* Centra el contenido horizontalmente */
        }

        .news-container a img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Asegura que la imagen cubra el contenedor sin distorsionarse */
            display: block;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .news-container a:hover img {
            transform: scale(1.05);
        }

        .news-container a:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .news-container .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6); /* Fondo semitransparente */
            color: #fff;
            padding: 10px;
            text-align: center;
            border-radius: 0 0 10px 10px;
            font-size: 1rem;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .news-container a:hover .overlay {
            opacity: 1;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <h1>WineApp</h1>
        </div>
        <nav class="nav">
            <a href="{{ url_for('academia') }}" class="btn btn-primary">Sommelier</a>
            <a href="{{ url_for('agenda') }}" class="btn btn-primary">Eventos</a>
            <a href="{{ url_for('turismo') }}" class="btn btn-primary">Turismo</a>
            <a href="{{ url_for('noticias') }}" class="btn btn-primary">Noticias</a>
            <a href="{{ url_for('foro') }}" class="btn btn-primary">Foro de Opinion</a>            
        </nav>
    </header>
    <div class="news-container">
        <a href="{{ url_for('academia') }}">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRFVbhctz9OsEijIuZ90IYfW9bQMbv4QJhDug&s" alt="Descripción de la imagen">
            <div class="overlay">Te invito a participar de la Academia de Vino!!</div>
        </a>
        <a href="{{ url_for('agenda') }}">
            <img src="https://d26lpennugtm8s.cloudfront.net/stores/297/531/rte/iStock_000062284240_Large-1000x600.jpg" alt="Descripción de la imagen">
            <div class="overlay">Conoce la agenda de Eventos </div>
        </a>
        <a href="{{ url_for('turismo') }}">
            <img src="https://i.pinimg.com/564x/0a/a4/cc/0aa4cc6c907ea593afb93c7e37933a03.jpg" alt="Descripción de la imagen">
            <div class="overlay">Conociendo el camino del Vino</div>
        </a>
        <a href="{{ url_for('noticias') }}">
            <img src="https://www.salta.gob.ar/public/images/noticias/73389-24-de-noviembre-dia-del-vino-argentino.jpeg" alt="Descripción de la imagen">
            <div class="overlay">Te invito a conocer las ultimas novedades</div>
        </a>
        <a href="{{ url_for('foro') }}">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSBT4jdMVZj9lUuuuKf_xRkXRmNWHn-5r8vsw&s" alt="Descripción de la imagen">
            <div class="overlay">Unite y conoce mas sobre la cultura Vitivinicola </div>
        </a>
    </div>
</body>
</html>
